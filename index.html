<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMR Quiz - Cyberpunk Edition</title>
  <meta name="description" content="Juego educativo cyberpunk sobre Sistemas Microinformáticos y Redes">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #00f2ff;
      --secondary: #7000ff;
      --success: #00ff9d;
      --danger: #ff0055;
      --warning: #ffcc00;
      --bg-dark: #050510;
      --card-bg: rgba(20, 20, 35, 0.6);
      --glass-border: 1px solid rgba(255, 255, 255, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Roboto', sans-serif;
      background-color: var(--bg-dark);
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      width: 100%;
      text-align: center;
    }

    .logo {
      font-size: 80px;
      margin-bottom: 20px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 48px;
      background: linear-gradient(to right, #fff, var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #94a3b8;
      font-size: 18px;
      margin-bottom: 40px;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px;
      border: var(--glass-border);
      box-shadow: 0 0 50px rgba(0, 242, 255, 0.2);
    }

    .status {
      font-size: 24px;
      color: var(--success);
      margin-bottom: 30px;
    }

    .btn {
      padding: 15px 40px;
      background: linear-gradient(135deg, var(--primary), #0099cc);
      border: none;
      border-radius: 50px;
      color: #000;
      font-family: 'Orbitron', sans-serif;
      font-weight: bold;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin: 10px;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0, 242, 255, 0.4);
    }

    .info {
      margin-top: 30px;
      color: #94a3b8;
      font-size: 14px;
    }

    .info a {
      color: var(--primary);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">💻</div>
    <h1>SMR Quiz</h1>
    <p class="subtitle">Sistemas Microinformáticos y Redes</p>
    
    <div class="card">
      <div class="status">✅ SITIO WEB ACTIVO</div>
      <p style="margin-bottom: 30px; font-size: 18px;">
        ¡Bienvenido a SMR Quiz! El juego está cargando...
      </p>
      <button class="btn" onclick="location.reload()">
        <i class="fas fa-sync-alt"></i> Recargar
      </button>
      <button class="btn" onclick="window.open('https://github.com/xthejokerx03/smr-quiz', '_blank')">
        <i class="fab fa-github"></i> Ver Código
      </button>
      
      <div class="info">
        <p>📁 Archivos detectados en el repositorio:</p>
        <p id="fileList" style="font-family: monospace; margin-top: 10px;">Cargando...</p>
      </div>
    </div>
  </div>

  <script>
    // Detectar si estamos en GitHub Pages
    document.getElementById('fileList').innerHTML = 
      'index.html ✓ (este archivo)';
    
    // Redirigir automáticamente al juego completo después de 3 segundos
    setTimeout(() => {
      window.location.href = 'https://xthejokerx03.github.io/smr-quiz/juego.html';
    }, 3000);
  </script>
</body>
</html>
